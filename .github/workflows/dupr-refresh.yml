name: DUPR rankings refresh

# Auto-refresh src/content/dupr-rankings.ts every Monday at 02:00 UTC
# (09:00 GMT+7, before the work day starts in Vietnam). Cuong can also
# trigger manually via the "Run workflow" button on the Actions tab.
#
# How it works:
#   1. Checkout main with write permission
#   2. Run scripts/parse-dupr.py — fetches the latest DUPR pages and
#      regenerates src/content/dupr-rankings.ts
#   3. If the file changed, commit + push back to main. Cloudflare Pages
#      then auto-deploys the refresh — no manual step needed.
#   4. If no change, the job is a no-op.

on:
  schedule:
    - cron: "0 2 * * 1"   # Mondays 02:00 UTC = 09:00 GMT+7
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write           # Required to push the refreshed file

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run DUPR parser
        run: python3 scripts/parse-dupr.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet src/content/dupr-rankings.ts; then
            echo "No DUPR changes this week. Nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/dupr-rankings.ts
          git commit -m "chore(rankings): weekly DUPR snapshot refresh

          Auto-generated by .github/workflows/dupr-refresh.yml
          (cron: Mondays 02:00 UTC). Source pages:
          - https://www.dupr.com/rankings
          - https://www.dupr.com/continental-rankings/{asia,north-america,
            south-america,australia-oceania,europe}"
          git push origin main
