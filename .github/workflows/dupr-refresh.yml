name: DUPR rankings refresh

# Auto-refresh src/content/dupr-rankings.ts every Monday at 02:00 UTC
# (09:00 GMT+7, before the work day starts in Vietnam). Cuong can also
# trigger manually via the "Run workflow" button on the Actions tab.
#
# How it works:
#   1. Checkout main (using DUPR_PUSH_TOKEN so the PR can trigger required checks)
#   2. Run scripts/parse-dupr.py — fetches the latest DUPR pages and
#      regenerates src/content/dupr-rankings.ts
#   3. If the file changed, open a PR from a chore/ branch and enable
#      auto-merge (squash). The required checks (quality + smoke) run on the
#      PR; once they pass, GitHub merges it and Cloudflare Pages auto-deploys.
#      If nothing changed, the job is a no-op.
#
# Why a PR instead of a direct push (changed 2026-06-08):
#   `main` is a protected branch requiring the `quality` + `smoke` status
#   checks, so a direct `git push origin main` from the bot is rejected
#   (GH006 protected branch hook declined). Opening a PR lets the checks run
#   and merge cleanly. The PR MUST be opened with a PAT (DUPR_PUSH_TOKEN),
#   NOT the default GITHUB_TOKEN, because GitHub does not trigger workflow
#   runs (the required checks) for events created by GITHUB_TOKEN.
#
# One-time setup required for this workflow to function:
#   - Add repo secret DUPR_PUSH_TOKEN — a PAT with contents:read-write +
#     pull-requests:read-write on this repo (classic `repo` scope also works).
#   - Settings -> General -> Pull Requests -> enable "Allow auto-merge".

on:
  schedule:
    - cron: "0 2 * * 1"   # Mondays 02:00 UTC = 09:00 GMT+7
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.DUPR_PUSH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run DUPR parser
        run: python3 scripts/parse-dupr.py

      - name: Open auto-merge PR if changed
        env:
          GH_TOKEN: ${{ secrets.DUPR_PUSH_TOKEN }}
        run: |
          if git diff --quiet src/content/dupr-rankings.ts; then
            echo "No DUPR changes this week. Nothing to commit."
            exit 0
          fi

          DATE="$(date -u +%F)"
          BRANCH="chore/dupr-refresh-${DATE}-r${GITHUB_RUN_NUMBER}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch -c "${BRANCH}"
          git add src/content/dupr-rankings.ts
          git commit -m "chore(rankings): weekly DUPR snapshot refresh (${DATE})"
          git push -u origin "${BRANCH}"

          gh pr create --base main --head "${BRANCH}" \
            --title "chore(rankings): weekly DUPR snapshot refresh (${DATE})" \
            --body "Automated weekly DUPR rankings snapshot from \`scripts/parse-dupr.py\` (source: www.dupr.com/rankings + continental pages). Auto-merges once \`quality\` + \`smoke\` pass."

          # Enable auto-merge; tolerate repos where it is not enabled yet so the
          # job stays green and the PR can be merged manually in the meantime.
          gh pr merge "${BRANCH}" --auto --squash --delete-branch \
            || echo "::warning::Auto-merge not enabled or checks pending; PR left open for manual merge."
