name: Security

# Phase 3E — dependency + static security scanning.
#   - npm audit: ADVISORY (report-only). The dep tree carries pre-existing
#     advisories; a hard gate would block every PR. Surfaces high/critical
#     so they're visible; flip continue-on-error off once the backlog is
#     triaged to make it a real gate.
#   - CodeQL: GitHub's static analysis for JS/TS. Reports findings to the
#     repo Security tab.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # weekly, Mondays 03:00 UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: npm audit (high + critical, advisory)
        continue-on-error: true
        run: |
          echo "### npm audit (high+critical)" >> "$GITHUB_STEP_SUMMARY"
          npm audit --audit-level=high | tee audit.txt || true
          # Surface a compact count in the job summary.
          npm audit --audit-level=high --json 2>/dev/null \
            | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const j=JSON.parse(s);const v=j.metadata?.vulnerabilities||{};console.log(`high=${v.high||0} critical=${v.critical||0} total=${v.total||0}`)}catch{console.log("audit parse skipped")}})' \
            >> "$GITHUB_STEP_SUMMARY" || true

  codeql:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
