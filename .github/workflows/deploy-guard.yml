name: Deploy guard

# After a push to main, guard against the two "code in source != deployed"
# traps from CLAUDE.md:
#   1. An edge function changed in the repo but never `supabase functions
#      deploy`-ed  -> auto-deploy the changed functions.
#   2. A migration file committed but never applied to prod -> drift check.
# Both alert Telegram on failure.
#
# Required GitHub secrets:
#   SUPABASE_ACCESS_TOKEN   Management API PAT (functions deploy + drift query)
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID   (optional) failure alerts
#
# verify_jwt is governed per-function by supabase/config.toml — we do NOT pass
# --no-verify-jwt here so the committed config stays the source of truth.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-guard-${{ github.ref }}
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: ajvlcamxemgbxduhiqrl

jobs:
  deploy-guard:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2 # need HEAD~1 to diff the push

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Detect changed edge functions
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/**')
          echo "Changed paths:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -q '^supabase/functions/_shared/'; then
            # Shared helpers changed — every consumer bundle may now be stale,
            # so redeploy ALL functions (defends the exact drift this guards).
            echo "→ _shared changed: redeploying ALL functions"
            FNS=$(ls -d supabase/functions/*/ \
              | sed 's#supabase/functions/##; s#/$##' \
              | grep -v '^_shared$' | sort -u | tr '\n' ' ')
          else
            # Only the touched function directories (exclude _shared).
            FNS=$(echo "$CHANGED" \
              | sed -nE 's#^supabase/functions/([^/]+)/.*#\1#p' \
              | grep -v '^_shared$' | sort -u | tr '\n' ' ')
          fi
          echo "functions=$FNS" >> "$GITHUB_OUTPUT"
          echo "To deploy: ${FNS:-<none>}"

      - name: Deploy changed edge functions
        if: steps.changed.outputs.functions != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          for fn in ${{ steps.changed.outputs.functions }}; do
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            echo "::endgroup::"
          done

      - name: Migration drift check (advisory)
        # Advisory only: this project applies migrations via direct SQL
        # (Management API), so schema_migrations under-reports and would
        # false-fail. The script exits 0 unless DRIFT_STRICT=1. continue-on-error
        # is belt-and-suspenders so a drift report never reds the build.
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/check-migration-drift.mjs

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets missing — skipping alert"; exit 0
          fi
          MSG="🛡️ *Deploy guard FAILED on main*%0A%0A"
          MSG="$MSG*Commit:* \`${GITHUB_SHA:0:7}\`%0A"
          MSG="$MSG*Run:* https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}%0A"
          MSG="$MSG_An edge function failed to deploy._"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" -d "text=${MSG}" \
            -d "parse_mode=Markdown" -d "disable_web_page_preview=true" > /dev/null
