name: Deploy guard

# After a push to main, guard against the two "code in source != deployed"
# traps from CLAUDE.md:
#   1. An edge function changed in the repo but never `supabase functions
#      deploy`-ed  -> auto-deploy the changed functions.
#   2. A migration file committed but never applied to prod -> drift check.
# Both alert Telegram on failure.
#
# Required GitHub secrets:
#   SUPABASE_ACCESS_TOKEN   Management API PAT (functions deploy + drift query)
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID   (optional) failure alerts
#
# verify_jwt is governed per-function by supabase/config.toml — we do NOT pass
# --no-verify-jwt here so the committed config stays the source of truth.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-guard-${{ github.ref }}
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: ajvlcamxemgbxduhiqrl

jobs:
  deploy-guard:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need HEAD~1 to diff the push

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Detect changed edge functions
        id: changed
        run: |
          # Names of function directories touched by this push (exclude _shared).
          FNS=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/**' \
            | sed -nE 's#^supabase/functions/([^/]+)/.*#\1#p' \
            | grep -v '^_shared$' | sort -u | tr '\n' ' ')
          echo "functions=$FNS" >> "$GITHUB_OUTPUT"
          echo "Changed functions: ${FNS:-<none>}"

      - name: Deploy changed edge functions
        if: steps.changed.outputs.functions != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          for fn in ${{ steps.changed.outputs.functions }}; do
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            echo "::endgroup::"
          done

      - name: Migration drift check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/check-migration-drift.mjs

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets missing — skipping alert"; exit 0
          fi
          MSG="🛡️ *Deploy guard FAILED on main*%0A%0A"
          MSG="$MSG*Commit:* \`${GITHUB_SHA:0:7}\`%0A"
          MSG="$MSG*Run:* https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}%0A"
          MSG="$MSG_Either an edge fn failed to deploy or a migration is unapplied._"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" -d "text=${MSG}" \
            -d "parse_mode=Markdown" -d "disable_web_page_preview=true" > /dev/null
