name: ThePickleHub
options:
  bundleIdPrefix: net.thepicklehub
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0" # language mode 5 for SDK compatibility; flip to 6 in a later phase
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    DEVELOPMENT_LANGUAGE: vi
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  ThePickleHub:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ThePickleHub
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.thepicklehub.app.dev
        PRODUCT_NAME: ThePickleHub
        INFOPLIST_FILE: ThePickleHub/App/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn

  ThePickleHubTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: ThePickleHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.thepicklehub.app.dev.tests
        GENERATE_INFOPLIST_FILE: "YES"
