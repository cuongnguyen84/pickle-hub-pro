# ─── Bet #1 social layer (Sprint 1 skeletons) ──────────────────────────────
# verify_jwt = false per the existing ES256/HS256 workaround. Each function
# verifies the bearer token internally via supabase.auth.getUser() —
# helper at supabase/functions/_shared/auth.ts.

[functions.match-create]
verify_jwt = false

[functions.match-confirm]
verify_jwt = false

[functions.dupr-link]
verify_jwt = false
# User-facing; JWT verified internally via _shared/auth.getAuthUser
# (ES256/HS256 workaround — see CLAUDE.md).

[functions.dupr-sync]
verify_jwt = false
# Cron schedule activated manually via Supabase Dashboard → Database → Cron Jobs
# (older Supabase CLI versions reject a schedule key here; the dashboard cron
# is the source of truth — daily at 20:00 UTC = 03:00 ICT next day, refreshes
# up to 100 oldest-synced DUPR profiles per run).
# schedule = "0 20 * * *"

[functions.feed-generate]
verify_jwt = false

[functions.leaderboard-compute]
verify_jwt = false

[functions.notification-send]
verify_jwt = false

[functions.match-expire]
verify_jwt = false
# Cron schedule activated manually via Supabase Dashboard → Database → Cron Jobs
# (older Supabase CLI versions reject a schedule key here; the dashboard cron
# is the source of truth — daily at 21:00 UTC = 04:00 ICT, sweeps pending > 7d
# matches → expired).
# schedule = "0 21 * * *"

[functions.sitemap]
verify_jwt = false
# Public endpoint — robots/Googlebot/social crawlers must reach without auth.
# CF Pages /sitemap*.xml routes use service role key internally; this Supabase
# endpoint is a backup direct-access path.

[functions.og-image-match]
verify_jwt = false
# Public endpoint — Facebook/Twitter/LinkedIn/Slack scrapers must fetch the
# 1200×630 PNG when a /tran-dau/{slug} URL is shared. CF Pages /og/match/*
# proxies + caches in KV (7d TTL) — see functions/og/match/[slug].png.ts.

# ─── Sprint 6 — pro tour data integration ──────────────────────────────────
[functions.pro-tour-ingest]
verify_jwt = false
# Service-role gate: only the pro-tour-scraper Cloudflare Worker calls this
# endpoint, with the Supabase service role key as the bearer token. The
# function checks the bearer matches env.SUPABASE_SERVICE_ROLE_KEY exactly
# before doing any work — verify_jwt would block legitimate calls because
# the service role token isn't a user JWT.

[functions.pro-tour-trigger-scrape]
verify_jwt = false
# Admin-gated scrape trigger called from /admin/pro-tour. verify_jwt = false
# per the project-wide ES256/HS256 workaround (CLAUDE.md); the function
# verifies the bearer JWT internally via supabase.auth.getUser() and
# checks user_roles for admin role before forwarding the signed request
# to the pro-tour-scraper Cloudflare Worker. Required secrets:
#   SCRAPER_AUTH_SECRET    — must match the Worker's wrangler secret
#   PRO_TOUR_SCRAPER_URL   — e.g. https://pro-tour-scraper.<account>.workers.dev

# ─── Social Events MVP (Sprint 1 PR1) ──────────────────────────────────────
# Public phone-OTP registration. No auth required — these endpoints take a
# phone number + 6-digit code and write to event_registrations via the
# service-role key. RLS on otp_codes blocks all non-service access.
# Required secrets when running outside dev mode:
#   ESMS_API_KEY      — eSMS.vn API key
#   ESMS_SECRET_KEY   — eSMS.vn secret
#   ESMS_BRAND_NAME   — registered brandname (e.g. "PickleHub")
# Dev mode: set ENVIRONMENT=development to skip the gateway and emit the
# OTP to console (the response also carries `dev_mode_code`).

[functions.phone-otp-send]
verify_jwt = false

[functions.phone-otp-verify]
verify_jwt = false
